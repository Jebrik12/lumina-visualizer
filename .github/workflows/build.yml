name: build-windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      release:
        description: "Create GitHub Release (yes/no)"
        required: false
        default: "no"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install WebView2 SDK (NuGet)
        shell: pwsh
        run: |
          $dest = "$env:USERPROFILE\AppData\Local\PackageManagement\NuGet\Packages"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          nuget install Microsoft.Web.WebView2 -OutputDirectory $dest

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel 4

      - name: Validate and package
        shell: pwsh
        run: ./ci/postbuild.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: Lumina-Windows
          path: Lumina-Windows.zip

      - name: Release
        if: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'yes') || contains(github.event.head_commit.message, '[release]') }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create v1.0.${{ github.run_number }} Lumina-Windows.zip --title "Lumina v1.0.${{ github.run_number }}" --notes "Lumina - audio visualizer plugin for Windows (VST3 + Standalone). Unzip, copy the Lumina.vst3 folder into C:\Program Files\Common Files\VST3, then rescan plugins in Ableton Live. See README.md for details."
